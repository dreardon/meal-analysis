steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'gcr.io/$PROJECT_ID/meal-analysis',
      '.'
    ]
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meal-analysis']
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'beta'
      - 'run'
      - 'deploy'
      - 'meal-analysis'
      - '--image'
      - 'gcr.io/$PROJECT_ID/meal-analysis'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--iap'
      - '--set-env-vars'
      - 'REASONING_ENGINE_URL_BASE=$_REASONING_ENGINE_URL_BASE'
images:
  - 'gcr.io/$PROJECT_ID/meal-analysis'
substitutions:
  _REASONING_ENGINE_URL_BASE: ''
