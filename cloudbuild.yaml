steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: [
      'build',
      '-t',
      'gcr.io/$PROJECT_ID/meal-analysis',
      '.'
    ]
  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/meal-analysis']
  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'meal-analysis'
      - '--image'
      - 'gcr.io/$PROJECT_ID/meal-analysis'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--no-allow-unauthenticated'
      - '--set-env-vars'
      - 'REASONING_ENGINE_URL_BASE=$_REASONING_ENGINE_URL_BASE,VITE_GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID,VITE_FIREBASE_API_KEY=$_FIREBASE_API_KEY,VITE_FIREBASE_AUTH_DOMAIN=$_FIREBASE_AUTH_DOMAIN,VITE_FIREBASE_PROJECT_ID=$_FIREBASE_PROJECT_ID,VITE_FIREBASE_STORAGE_BUCKET=$_FIREBASE_STORAGE_BUCKET,VITE_FIREBASE_MESSAGING_SENDER_ID=$_FIREBASE_MESSAGING_SENDER_ID,VITE_FIREBASE_APP_ID=$_FIREBASE_APP_ID'
images:
  - 'gcr.io/$PROJECT_ID/meal-analysis'
substitutions:
  _REASONING_ENGINE_URL_BASE: ''
  _GOOGLE_CLIENT_ID: ''
  _FIREBASE_API_KEY: ''
  _FIREBASE_AUTH_DOMAIN: ''
  _FIREBASE_PROJECT_ID: ''
  _FIREBASE_STORAGE_BUCKET: ''
  _FIREBASE_MESSAGING_SENDER_ID: ''
  _FIREBASE_APP_ID: ''
